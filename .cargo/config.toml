# Static-link the MSVC C runtime into Baudrun.exe on Windows builds.
#
# Without this, the Rust+MSVC toolchain emits a binary that dynamically
# links against VCRUNTIME140.dll (Visual C++ 2015+ Redistributable).
# That DLL is *not* guaranteed on a freshly-imaged Windows machine —
# notably, it's missing from the winget validator's sandbox image,
# which is what failed PR #376876's automated launch test on both
# x64 and arm64 with exit code -1073741515 = 0xC0000135 =
# STATUS_DLL_NOT_FOUND, fired by the Windows loader before any Rust
# code runs (and so before the friendly_open_error path could catch
# it). Same trap that would hit any user on a fresh Windows install
# who downloaded the .msi directly — they'd double-click and get
# Windows' "The code execution cannot proceed because VCRUNTIME140.dll
# was not found" error dialog, with no recovery hint from us.
#
# `+crt-static` rolls the CRT into Baudrun.exe (≈200 KB binary
# growth), making it wholly self-contained at the C-runtime layer.
# No vcredist install step, no winget `Dependencies` manifest entry,
# no DLL hunt on stripped-down Windows images.
#
# The `target_env = "msvc"` guard means a MinGW-toolchain build
# (which we don't ship but a contributor might run locally) is
# unaffected — `+crt-static` on gnu-windows links against MinGW's
# libgcc + libstdc++, which is a separate question.
[target.'cfg(all(target_os = "windows", target_env = "msvc"))']
rustflags = ["-C", "target-feature=+crt-static"]
