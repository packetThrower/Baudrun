<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Baudrun</title>
    <!-- Pre-paint body during the brief moment between HTML parse
         and external CSS loading. Once style.css applies, body bg
         resets to var(--bg-window) — which is transparent for the
         default Baudrun skin (so macOS NSVisualEffectView vibrancy
         shows through) and solid for skins like Windows-11. The
         OS-level webview surface is painted via Tauri's builder
         `background_color` from the saved appearance, which covers
         the same gap on Windows / Linux without overpainting macOS
         vibrancy.
         An earlier alpha pre-painted `#app` too, but that broke
         skins like Baudrun dark whose translucent panels rely on
         the vibrancy substrate underneath — `#app` ended up sitting
         OVER vibrancy and the panels mixed with the wrong base
         layer. Body-only is the right scope.
         `color-scheme` keeps form-control defaults (focus rings,
         scrollbars) coherent with the painted bg. -->
    <style>
        html, body {
            background: #1d1d1d;
            color-scheme: dark light;
            margin: 0;
        }
        @media (prefers-color-scheme: light) {
            html, body { background: #f2f2f7; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script src="./src/main.ts" type="module"></script>
</body>
</html>
