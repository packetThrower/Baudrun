name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - "build/appicon.png"
      - "build/appicon.svg"
      - "build/make-icon.sh"
      - "docs-next/**"
      - ".github/workflows/docs.yml"
      - ".github/FUNDING.yml"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - "build/appicon.png"
      - "build/appicon.svg"
      - "build/make-icon.sh"
      - "docs-next/**"
      - ".github/workflows/docs.yml"
      - ".github/FUNDING.yml"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
  # Lets release.yml run the same matrix without duplicating the
  # matrix definition; release.yml gates on a green CI run before
  # it builds the actual signed/notarized artifacts.
  workflow_call:

# CI only reads the repo — no releases, no commits, no PR writes.
# Pin the token to the minimum so a compromised action in the
# matrix can't do anything with it. release.yml's `ci` job calls
# this workflow and inherits this same read-only ceiling.
permissions:
  contents: read

# Cancel superseded PR runs — a re-push to a PR shouldn't leave the
# previous run burning all six matrix runners to completion. Keyed
# on the PR number for `pull_request`, the ref otherwise; cancelling
# is gated to PRs so pushes to `main` and the release-triggered
# `workflow_call` run (which arrives as event_name: push) always run
# to completion.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rust:
    name: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — arm64 (M-series) and amd64 (Intel) on Sequoia.
          # macos-26 is GitHub's Apple-Silicon-only runner; macos-15-intel
          # replaced the retired macos-13 image and stays available
          # through 2027 while Apple's Intel transition wraps up.
          - runner: macos-26
            arch: arm64
          - runner: macos-15-intel
            arch: amd64
          # Windows — x64 + arm64. windows-11-arm landed in 2025 and
          # gives us a native runner; no Prism cross-compile dance.
          - runner: windows-latest
            arch: amd64
          - runner: windows-11-arm
            arch: arm64
          # Linux — amd64 + arm64. ubuntu-24.04-arm uses Cobalt 100
          # silicon. Both ship Ubuntu 24.04 which has libxkbcommon
          # 1.6 and libwayland 1.22 — current enough for gpui_linux
          # to compile from a clean checkout.
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      # Third-party actions are pinned to a full commit SHA — a
      # mutable tag like `@v6` can be repointed at malicious code
      # by a repo or token compromise. The `# vX.Y.Z` comment is
      # what Dependabot reads + bumps when a real release ships.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # `dtolnay/rust-toolchain` selects the channel from the ref
      # name (`@stable`), so a SHA pin loses that signal — the
      # `toolchain:` input carries it explicitly instead.
      - name: Setup Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Linux: libusb (rusb / CP210x direct backend) + libudev
      # (serialport's tty enumerator). xkbcommon / wayland / x11 /
      # xcb are gpui_linux's compile-time pkg-config deps.
      # No GTK / WebKit / soup / appindicator — gpui owns the
      # window + renderer end-to-end. Vulkan loads at runtime via
      # ash's dlopen so no SDK install needed for `cargo check`
      # / `cargo test --lib`.
      - name: Install Linux deps
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libusb-1.0-0-dev libudev-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev libxcb1-dev libxcb-randr0-dev \
            libxcb-xkb-dev libxcb-cursor-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-render0-dev \
            libfontconfig1-dev libfreetype-dev \
            pkg-config

      # macOS: libusb for rusb's bulk transfers. pkg-config so the
      # build script can locate it via Homebrew's prefix.
      - name: Install macOS deps
        if: startsWith(matrix.runner, 'macos-')
        run: brew install libusb pkg-config

      # Windows: nothing extra. The gpui DirectX backend, serialport,
      # and rusb (via libusb1-sys's bundled fallback) all link
      # against libraries that ship with the Windows SDK image.

      # `cargo clippy` is a strict superset of `cargo check` — it
      # runs the same compiler front-end and fails on the same
      # compile errors, then adds the lint pass on top. A separate
      # `cargo check` step would just compile the crate twice for
      # no extra signal, so clippy is the gate.
      - name: cargo clippy
        run: cargo clippy -- -D warnings

      # Single `[[bin]]` crate, no library target, so `cargo test`
      # runs the in-binary unit tests (under `mod tests` in each
      # data/ module + serial/ + usbserial/ + transfer.rs). Don't
      # pass `--lib` — that errors with "no library targets found".
      - name: cargo test
        run: cargo test
