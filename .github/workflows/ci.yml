name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - "build/appicon.png"
      - "build/appicon.svg"
      - "build/make-icon.sh"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - ".github/FUNDING.yml"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - "build/appicon.png"
      - "build/appicon.svg"
      - "build/make-icon.sh"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - ".github/FUNDING.yml"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_call:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: svelte-check
        run: npm run check

      - name: Build frontend
        run: npm run build

      # tauri::generate_context! embeds dist/ at compile time, so the
      # Rust matrix below needs this output. Uploading once instead
      # of rebuilding per-platform cuts ~15s × 6 runners.
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist

  rust:
    needs: [frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch: arm64
          - runner: macos-15-intel
            arch: amd64
          - runner: windows-latest
            arch: amd64
          - runner: windows-11-arm
            arch: arm64
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux: Tauri needs GTK + WebKit2 for wry to link. libusb is
      # linked by rusb (usbserial CP210x backend). libsoup3-dev
      # became a transitive requirement on WebKit2GTK 4.1+.
      # libudev-dev is a transitive dep of the serialport crate
      # (via libudev-sys) for tty/serial enumeration.
      - name: Install Linux deps
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libusb-1.0-0-dev libudev-dev pkg-config

      # macOS: libusb for rusb's bulk transfers. pkg-config so the
      # build script can locate it via Homebrew's prefix.
      - name: Install macOS deps
        if: startsWith(matrix.runner, 'macos-')
        run: brew install libusb pkg-config

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib
