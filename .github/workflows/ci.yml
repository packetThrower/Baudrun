name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - "build/appicon.png"
      - "build/make-icon.sh"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - "build/appicon.png"
      - "build/make-icon.sh"
  workflow_call:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: svelte-check
        working-directory: frontend
        run: npm run check

      # The Go build embeds frontend/dist via //go:embed, so downstream
      # matrix jobs need it.
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  go:
    needs: [frontend]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, windows-11-arm, ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    # The enumerator package's usb_darwin.go uses #cgo LDFLAGS, so without
    # cgo it gets excluded and nativeGetDetailedPortsList goes undefined.
    # setup-go@v6 doesn't force CGO=1 the way v5 did, so pin it here.
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      # Wails' Linux bindings pull in webkit2gtk + gtk3 at cgo link time.
      # Without these packages `go build` fails on the main module. macOS
      # and Windows runners have their webview deps preinstalled.
      - name: Install Linux webview deps
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      # webkit2_41 tells Wails to pkg-config against webkit2gtk-4.1
      # instead of the default 4.0 (which Ubuntu 24.04 no longer ships).
      # The tag is a no-op on non-Linux matrix entries because the
      # webkit2_4x.go files are all //go:build linux-gated.
      - name: Vet
        run: go vet -tags webkit2_41 ./...

      - name: Build
        run: go build -tags webkit2_41 ./...

      - name: Test
        run: go test -tags webkit2_41 ./...
