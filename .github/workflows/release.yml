name: Release

on:
  push:
    tags:
      # Stable SemVer: v0.4.0, v1.2.3.
      - "v[0-9]+.[0-9]+.[0-9]+"
      # Pre-release SemVer: v0.8.0-beta.1, v1.0.0-rc.2, etc. The
      # release job inspects the tag and flips prerelease=true on
      # the GitHub Release when a hyphen is present, so these show
      # up with the "Pre-release" label and don't displace the
      # "Latest release" pointer.
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

# Queue, don't cancel: a mid-flight release shouldn't be interrupted
# by a retag of the same version — risk of half-uploaded artifacts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-macos:
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26 is Apple Silicon only (Tahoe SDK). macos-15-intel
          # is GitHub's replacement for the retired macos-13 image —
          # x86_64 hardware running Sequoia, supported through 2027
          # while Apple's Intel transition wraps up.
          - runner: macos-26
            arch: arm64
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            arch: amd64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # libusb is needed at link time by rusb (CP210x direct-USB
      # backend). Each runner ships its native arch Homebrew slice —
      # amd64 on macos-15-intel, arm64 on macos-26 — so no Rosetta
      # dance required.
      - name: Install libusb
        run: brew install libusb pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json
          echo "Using version: $VERSION"

      # `updater` in --bundles is what makes tauri-bundler emit the
      # `.app.tar.gz` + `.sig` pair next to the regular .app — they
      # don't appear automatically just because TAURI_SIGNING_PRIVATE_KEY
      # is set. The custom re-tar step below then overwrites the
      # auto-generated tarball with one packed AFTER our libusb
      # install_name_tool fixup, but the `updater` target still has to
      # be selected so tauri-bundler writes the initial pair.
      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: --target ${{ matrix.target }} --bundles app dmg updater

      # rusb links against Homebrew's libusb via an absolute path;
      # ship a bundled copy inside .app/Contents/Frameworks so
      # downloaded builds don't require Homebrew on the user's
      # machine. Rewrites the load command via install_name_tool and
      # fails loudly if any /opt/homebrew or /usr/local path remains.
      - name: Bundle libusb into .app
        run: |
          APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Baudrun.app"
          BIN="$APP_DIR/Contents/MacOS/Baudrun"
          FRAMEWORKS="$APP_DIR/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"

          LIBUSB_SRC=$(otool -L "$BIN" | awk '/libusb-1\.0/ {print $1; exit}')
          if [ -z "$LIBUSB_SRC" ]; then
            echo "binary has no libusb dependency — unexpected"
            otool -L "$BIN"
            exit 1
          fi
          cp "$LIBUSB_SRC" "$FRAMEWORKS/libusb-1.0.0.dylib"
          chmod 644 "$FRAMEWORKS/libusb-1.0.0.dylib"

          install_name_tool -change "$LIBUSB_SRC" \
            "@executable_path/../Frameworks/libusb-1.0.0.dylib" "$BIN"

          echo "--- otool after bundle ---"
          otool -L "$BIN"
          if otool -L "$BIN" | grep -qE '(/opt/homebrew|/usr/local/)'; then
            echo "binary still references a Homebrew path; bundling failed"
            exit 1
          fi

          # install_name_tool rewrites invalidate any signature
          # tauri-action applied during the build, and Gatekeeper
          # rejects unsigned-after-modification binaries with the
          # "damaged" message rather than the milder "unidentified
          # developer" prompt. Re-sign the bundled dylib + the
          # binary + the whole .app ad-hoc (`-` codesigning identity)
          # so the signatures cover the post-rewrite bytes. Users
          # without paid Apple Developer accounts still need to
          # right-click → Open or run `xattr -cr Baudrun.app` to
          # bypass the quarantine prompt, but they don't see
          # "damaged" anymore.
          codesign --force --sign - "$FRAMEWORKS/libusb-1.0.0.dylib"
          codesign --force --sign - "$BIN"
          codesign --force --deep --sign - "$APP_DIR"
          codesign --verify --deep --strict --verbose=2 "$APP_DIR"

      # Tauri produces a .dmg already; we additionally zip the .app
      # so users who prefer "drag to /Applications" don't have to
      # mount the DMG.
      #
      # `ditto -c -k --keepParent`, NOT `zip -r`. macOS code
      # signatures live in xattrs (com.apple.cs.*), and standard
      # zip strips them — so a .app round-tripped through plain
      # zip → unzip launches with EXC_BAD_ACCESS / Code Signature
      # Invalid at runtime even when the signature was perfectly
      # valid pre-zip. ditto preserves xattrs + resource forks +
      # symlinks; macOS Finder + `ditto -x -k` on the receiving end
      # restore them on unpack.
      - name: Package .app as zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p release-artifacts
          ditto -c -k --keepParent \
            "$BUNDLE_DIR/macos/Baudrun.app" \
            "release-artifacts/Baudrun-macOS-${{ matrix.arch }}-${VERSION}.zip"
          cp "$BUNDLE_DIR/dmg"/*.dmg release-artifacts/ 2>/dev/null || true

      # tauri-action's signing emits Baudrun.app.tar.gz + .sig BEFORE
      # the install_name_tool fixup above — so its contents reference
      # /opt/homebrew/lib/libusb. Replace both with a freshly-tarred
      # copy of the post-fixup .app, then re-sign with the updater
      # key via `tauri signer sign`. Without this step the auto-update
      # download would crash on user machines without Homebrew.
      - name: Re-tar and re-sign .app for updater
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          rm -f "$BUNDLE_DIR/Baudrun.app.tar.gz" "$BUNDLE_DIR/Baudrun.app.tar.gz.sig"
          # BSD tar on macOS preserves xattrs by default; that's where
          # the codesign signature we just applied lives.
          tar -czf "$BUNDLE_DIR/Baudrun.app.tar.gz" -C "$BUNDLE_DIR" Baudrun.app
          # `signer sign` reads the key from TAURI_SIGNING_PRIVATE_KEY
          # in the environment (set above), so no -k flag is needed.
          # Empty password matches how the key was generated.
          npx @tauri-apps/cli signer sign -p "" "$BUNDLE_DIR/Baudrun.app.tar.gz"
          # Rename to include the arch so updater latest.json can
          # disambiguate aarch64 vs x86_64 from a single release.
          VERSION="${GITHUB_REF_NAME#v}"
          UPDATE_NAME="Baudrun-${VERSION}-${{ matrix.arch }}.app.tar.gz"
          mv "$BUNDLE_DIR/Baudrun.app.tar.gz" "release-artifacts/$UPDATE_NAME"
          mv "$BUNDLE_DIR/Baudrun.app.tar.gz.sig" "release-artifacts/$UPDATE_NAME.sig"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-package
          path: release-artifacts/*

  build-windows:
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: amd64
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            arch: arm64
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Patch version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $json = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          Write-Host "Using version: $version"

      # WiX (MSI) requires a numeric-only pre-release identifier and
      # rejects alphanumeric ones like 0.9.0-alpha.3. NSIS has no
      # such restriction. So pre-release tags ship NSIS only; stable
      # tags ship both MSI + NSIS for corporate-deploy use cases.
      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          # `updater` adds the .nsis.zip + .sig pair the auto-updater
          # downloads. Pre-release tags drop msi (WiX rejects the
          # alphanumeric pre-release identifier).
          args: --target ${{ matrix.target }} --bundles ${{ contains(github.ref_name, '-') && 'nsis updater' || 'msi nsis updater' }}

      # Collect the MSI (WiX, stable tags only) + NSIS .exe + a
      # portable zip of the bare Baudrun.exe for users who don't
      # want an installer. Updater bundles (.nsis.zip + .sig) come
      # from the NSIS bundler when signing is enabled — list every
      # NSIS output file before the targeted copies so a missing
      # updater bundle is obvious in the log instead of silently
      # skipped.
      - name: Package artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $arch = "${{ matrix.arch }}"
          $bundle = "src-tauri/target/${{ matrix.target }}/release/bundle"
          New-Item -ItemType Directory -Force release-artifacts | Out-Null

          Write-Host "--- contents of $bundle ---"
          if (Test-Path $bundle) {
            Get-ChildItem -Path $bundle -Recurse -File | ForEach-Object { $_.FullName }
          }

          if (Test-Path "$bundle/msi") {
            Copy-Item "$bundle/msi/*.msi" release-artifacts/ -Verbose
          }
          if (Test-Path "$bundle/nsis") {
            Copy-Item "$bundle/nsis/*.exe" release-artifacts/ -Verbose
            # Updater feed: NSIS-format zipped installer + signature.
            # Tauri's installer-mode updater on Windows downloads this
            # zip, extracts it, and runs the installer in /SILENT mode.
            Get-ChildItem "$bundle/nsis/*.nsis.zip" -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName release-artifacts/ -Verbose }
            Get-ChildItem "$bundle/nsis/*.nsis.zip.sig" -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName release-artifacts/ -Verbose }
          }
          Compress-Archive `
            -Path "src-tauri/target/${{ matrix.target }}/release/Baudrun.exe" `
            -DestinationPath "release-artifacts/Baudrun-Windows-$arch-$version.zip"

          Write-Host "--- staged ---"
          Get-ChildItem release-artifacts | ForEach-Object { $_.Name }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-package
          path: release-artifacts/*

  build-linux:
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            target: x86_64-unknown-linux-gnu
            appimage_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
            appimage_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri's Linux build links against GTK3 + WebKit2GTK 4.1 +
      # libsoup3. libayatana-appindicator for system-tray (Tauri
      # dependency even if we don't use it today). librsvg for
      # .AppImage + .deb icon scaling. libusb for rusb's bulk
      # transfers. file + fuse3 are needed by appimagetool. fpm
      # (via ruby-dev) builds the .pkg.tar.zst since Tauri's
      # bundler doesn't handle pacman packages.
      # xdg-utils provides /usr/bin/xdg-open which Tauri's AppImage
      # bundler copies into the AppImage so plugin-opener works on
      # target systems without xdg-utils installed.
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libusb-1.0-0-dev libudev-dev pkg-config \
            xdg-utils \
            ruby-dev build-essential file libfuse2t64 libarchive-tools

      - name: Install fpm
        run: sudo gem install --no-document fpm

      - name: Install npm dependencies
        run: npm ci

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json
          echo "Using version: $VERSION"

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          # `updater` makes tauri-bundler emit AppImage.tar.gz + .sig
          # alongside the bare .AppImage; without it those updater
          # feed files don't get produced.
          args: --target ${{ matrix.target }} --bundles deb rpm appimage updater

      # Tauri doesn't generate .pkg.tar.zst — fpm's pacman target
      # does. Reuse the same binary + desktop file + icon + udev
      # rule the .deb already bundled, staged into a fresh tree
      # under pkg/ so fpm sees a clean layout.
      - name: Stage install tree for pacman
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release"
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
          mkdir -p pkg/usr/lib/udev/rules.d
          install -m 755 "$BUNDLE_DIR/baudrun" pkg/usr/bin/baudrun
          install -m 644 packaging/linux/baudrun.desktop pkg/usr/share/applications/baudrun.desktop
          install -m 644 build/appicon.png pkg/usr/share/icons/hicolor/256x256/apps/baudrun.png
          install -m 644 packaging/linux/60-baudrun-serial.rules pkg/usr/lib/udev/rules.d/60-baudrun-serial.rules

      # Arch pkgver can't contain `-` — Arch uses `-` as the
      # pkgver/pkgrel separator. Collapse SemVer pre-release
      # suffixes to `_` so 0.8.0-beta.1 → 0.8.0_beta.1.
      - name: Build .pkg.tar.zst
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH_VERSION="${VERSION//-/_}"
          fpm -s dir -t pacman \
            --name baudrun \
            --version "${ARCH_VERSION}" \
            --iteration "1" \
            --architecture "${{ matrix.appimage_arch }}" \
            --depends "gtk3" \
            --depends "webkit2gtk-4.1" \
            --depends "libusb" \
            --description "A serial terminal for network devices" \
            --url "https://github.com/packetThrower/Baudrun" \
            --maintainer "Will Lehnertz <6597817+packetThrower@users.noreply.github.com>" \
            --license "GPL-3.0-or-later" \
            --after-install packaging/linux/baudrun-postinstall.sh \
            --after-upgrade packaging/linux/baudrun-postinstall.sh \
            -C pkg \
            --package "baudrun-${ARCH_VERSION}-1-${{ matrix.appimage_arch }}.pkg.tar.zst" \
            .

      # Collect every artifact into a flat dir for upload. Each cp
      # is wrapped in a function that prints what's matched (or notes
      # the dir) so missing files surface in the log instead of being
      # swallowed by a silent glob non-match. Tauri 2's appimage
      # bundler emits BOTH `Baudrun_*` (display-name cased) and a
      # secondary `baudrun_*` (binary-name cased) copy of every file —
      # the dedupe loop keeps just the display-name copies so the
      # release page doesn't show duplicates.
      - name: Collect artifacts
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p release-artifacts

          echo "--- contents of $BUNDLE_DIR ---"
          find "$BUNDLE_DIR" -maxdepth 3 -type f -printf "%P\n" || true

          # Display-cased outputs only — skip the lowercase `baudrun_*`
          # twins tauri's appimage bundler also writes.
          collect() {
            local dir="$1"; local pattern="$2"
            shopt -s nullglob
            local files=( "$dir"/$pattern )
            shopt -u nullglob
            if [ ${#files[@]} -eq 0 ]; then
              echo "no match: $dir/$pattern"
              return 0
            fi
            for f in "${files[@]}"; do
              local name=$(basename "$f")
              # Skip the lowercase twin pair on Linux AppImage outputs.
              if [[ "$name" == baudrun_* ]]; then
                continue
              fi
              cp -v "$f" release-artifacts/
            done
          }

          collect "$BUNDLE_DIR/deb" "*.deb"
          collect "$BUNDLE_DIR/rpm" "*.rpm"
          collect "$BUNDLE_DIR/appimage" "*.AppImage"
          collect "." "*.pkg.tar.zst"

          # Updater feed: AppImage.tar.gz + .sig (signed by tauri-bundler
          # when TAURI_SIGNING_PRIVATE_KEY was set on the build step).
          # .deb / .rpm / pacman users update via the distro package
          # manager and don't go through Tauri's auto-updater.
          collect "$BUNDLE_DIR/appimage" "*.AppImage.tar.gz"
          collect "$BUNDLE_DIR/appimage" "*.AppImage.tar.gz.sig"

          echo "--- staged ---"
          ls -la release-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-package
          path: release-artifacts/*

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      # Full history + tags so the release-notes step below can
      # resolve the previous tag and list commits between it and
      # the current tag.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "*-package"

      # Hash with bare basenames (not their subdir paths) so SHA256SUMS
      # lines match the filenames users see on the release page.
      - name: Generate SHA256SUMS
        run: |
          for dir in artifacts/*/; do
            (cd "$dir" && sha256sum *)
          done | sort > SHA256SUMS
          cat SHA256SUMS

      # Build a "What's Changed" body from the commit log between the
      # previous tag and this one. GitHub's generate_release_notes
      # only lists PR-merged commits, which misses direct-to-main
      # commits. Previous-tag logic branches on release type:
      #   - Pre-release (v*.*.*-*): walk to the most recent tag of
      #     any kind. Beta-to-beta deltas are easy to read.
      #   - Stable (v*.*.*): --exclude='*-*' skips pre-release tags
      #     so the final release's log spans the whole stable-to-
      #     stable window, not just the delta since the last beta.
      - name: Build release notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if [[ "${CURRENT_TAG}" == *-* ]]; then
            IS_PRERELEASE=1
            PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
          else
            IS_PRERELEASE=0
            PREV_TAG=$(git describe --tags --abbrev=0 --exclude='*-*' "${CURRENT_TAG}^" 2>/dev/null || true)
          fi

          {
            if [ "$IS_PRERELEASE" = "1" ]; then
              echo "> ⚠️ **Pre-release.** Published for testing. Behaviour and artifacts are not final."
              echo
            fi
            echo "## What's Changed"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log --no-merges --format='* %s (%h)' "${PREV_TAG}..${CURRENT_TAG}"
              echo
              echo "**Full Changelog**: ${REPO_URL}/compare/${PREV_TAG}...${CURRENT_TAG}"
            else
              git log --no-merges --format='* %s (%h)' "${CURRENT_TAG}"
              echo
              echo "**Full Changelog**: ${REPO_URL}/commits/${CURRENT_TAG}"
            fi
          } > release-notes.md

          echo "--- Generated release notes ---"
          cat release-notes.md

      # Updater manifest: served at
      # https://github.com/packetThrower/Baudrun/releases/latest/download/latest.json
      # which permalinks to the latest non-prerelease release. So we
      # only emit / upload it for stable tags — pre-release builds
      # still ship signed updater bundles, but the manifest stays
      # pinned to the most recent stable so existing users don't
      # auto-jump onto an alpha. Pre-release detection in-app stays
      # via the GitHub Releases API + browser-open path.
      - name: Generate updater manifest (stable only)
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Each .sig file is short minisign-format text — embed its
          # contents inline in the manifest so the updater plugin can
          # verify without an extra HTTP roundtrip.
          read_sig() {
            local f="$1"
            if [ -f "$f" ]; then
              cat "$f"
            else
              echo ""
            fi
          }

          # Match files by basename glob; the artifact step renames
          # macOS bundles to include the version + arch, but Linux /
          # Windows keep tauri-bundler's defaults.
          find_one() {
            local pattern="$1"
            find artifacts -type f -name "$pattern" | head -n 1
          }

          MAC_ARM=$(find_one "Baudrun-${VERSION}-arm64.app.tar.gz")
          MAC_X64=$(find_one "Baudrun-${VERSION}-amd64.app.tar.gz")
          LINUX_X64=$(find_one "*amd64.AppImage.tar.gz")
          LINUX_ARM=$(find_one "*aarch64.AppImage.tar.gz")
          WIN_X64=$(find_one "*x64-setup.nsis.zip")
          WIN_ARM=$(find_one "*arm64-setup.nsis.zip")

          # Release-asset URL pattern that resolves on the rendered
          # release page. Permalink form ensures GitHub redirects to
          # the actual blob storage URL the updater plugin then
          # downloads.
          asset_url() {
            local f="$1"
            if [ -z "$f" ] || [ ! -f "$f" ]; then
              echo ""
            else
              echo "https://github.com/${REPO}/releases/download/${TAG}/$(basename "$f")"
            fi
          }

          MAC_ARM_SIG=$(read_sig "${MAC_ARM}.sig")
          MAC_X64_SIG=$(read_sig "${MAC_X64}.sig")
          LINUX_X64_SIG=$(read_sig "${LINUX_X64}.sig")
          LINUX_ARM_SIG=$(read_sig "${LINUX_ARM}.sig")
          WIN_X64_SIG=$(read_sig "${WIN_X64}.sig")
          WIN_ARM_SIG=$(read_sig "${WIN_ARM}.sig")

          # Use jq to build the JSON so quoting / escaping in release
          # notes / signatures stay safe.
          NOTES="$(cat release-notes.md)"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg mac_arm_url "$(asset_url "$MAC_ARM")" --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg mac_x64_url "$(asset_url "$MAC_X64")" --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg lin_x64_url "$(asset_url "$LINUX_X64")" --arg lin_x64_sig "$LINUX_X64_SIG" \
            --arg lin_arm_url "$(asset_url "$LINUX_ARM")" --arg lin_arm_sig "$LINUX_ARM_SIG" \
            --arg win_x64_url "$(asset_url "$WIN_X64")" --arg win_x64_sig "$WIN_X64_SIG" \
            --arg win_arm_url "$(asset_url "$WIN_ARM")" --arg win_arm_sig "$WIN_ARM_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                {}
                + (if $mac_arm_url != "" then { "darwin-aarch64": { url: $mac_arm_url, signature: $mac_arm_sig } } else {} end)
                + (if $mac_x64_url != "" then { "darwin-x86_64": { url: $mac_x64_url, signature: $mac_x64_sig } } else {} end)
                + (if $lin_x64_url != "" then { "linux-x86_64": { url: $lin_x64_url, signature: $lin_x64_sig } } else {} end)
                + (if $lin_arm_url != "" then { "linux-aarch64": { url: $lin_arm_url, signature: $lin_arm_sig } } else {} end)
                + (if $win_x64_url != "" then { "windows-x86_64": { url: $win_x64_url, signature: $win_x64_sig } } else {} end)
                + (if $win_arm_url != "" then { "windows-aarch64": { url: $win_arm_url, signature: $win_arm_sig } } else {} end)
              )
            }' > latest.json

          echo "--- Generated latest.json ---"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/macos-arm64-package/*
            artifacts/macos-amd64-package/*
            artifacts/windows-amd64-package/*
            artifacts/windows-arm64-package/*
            artifacts/linux-amd64-package/*
            artifacts/linux-arm64-package/*
            SHA256SUMS
            ${{ !contains(github.ref_name, '-') && 'latest.json' || '' }}
          body_path: release-notes.md
          draft: false
          # Tags with a hyphen in the SemVer pre-release slot flag
          # as pre-release so GitHub shows the "Pre-release" badge
          # and leaves "Latest release" on the most recent stable.
          prerelease: ${{ contains(github.ref_name, '-') }}
