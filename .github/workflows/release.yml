name: Release

on:
  push:
    tags:
      # SemVer with leading v: v0.4.0, v1.2.3. Pre-release suffixes
      # (v0.4.0-rc.1) don't fire automatically — add a separate
      # trigger when that becomes a real need.
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

# Queue, don't cancel: a mid-flight release shouldn't be interrupted by a
# retag of the same version — risk of half-uploaded artifacts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-macos:
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26 is Apple Silicon only (Tahoe SDK, latest window
          # chrome). macos-15-intel is GitHub's replacement for the
          # retired macos-13 image — x86_64 hardware running Sequoia,
          # supported through fall 2027 when Apple's Intel transition
          # wraps up and GitHub retires it too.
          - runner: macos-26
            arch: arm64
          - runner: macos-15-intel
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      # libusb-1.0 is needed at cgo link time by gousb (used by
      # usbserial-go for CP210x / CH34x / etc.). Homebrew on each
      # runner ships the matching native arch — amd64 on
      # macos-15-intel, arm64 on macos-26 — so no Rosetta dance is
      # needed. The split matrix replaces the older darwin/universal
      # build for exactly this reason: a single binary would need
      # both arch libusb slices lipo'd into a universal dylib, which
      # is more moving parts than it's worth for the handful of Intel
      # Mac users left.
      - name: Install libusb
        run: brew install libusb pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Patch productVersion from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.json.tmp
          mv wails.json.tmp wails.json
          echo "Using version: $VERSION"

      # Reuse the dist that ci.yml's frontend job already built; -s tells
      # wails to skip the install+build phase and use what's on disk.
      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build
        run: wails build -s -platform darwin/${{ matrix.arch }}

      # Bundle libusb into the .app so downloaded builds don't assume
      # the user has Homebrew. `install_name_tool -change` rewrites
      # the binary's dylib reference from its absolute Homebrew path
      # to an @executable_path-relative one pointing at the bundled
      # copy. `otool -L` after the rewrite should show only system
      # paths (/usr/lib/...) and @executable_path/... — any remaining
      # /opt/homebrew/... or /usr/local/... line would mean a user
      # without Homebrew would see a dyld "image not found" on launch.
      - name: Bundle libusb into .app
        run: |
          APP="build/bin/Baudrun.app"
          BIN="$APP/Contents/MacOS/Baudrun"
          FRAMEWORKS="$APP/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"

          # Resolve the libusb the binary was linked against from the
          # loader commands — otool is more reliable than guessing the
          # Homebrew prefix by arch.
          LIBUSB_SRC=$(otool -L "$BIN" | awk '/libusb-1\.0/ {print $1; exit}')
          if [ -z "$LIBUSB_SRC" ]; then
            echo "binary has no libusb dependency — unexpected"
            otool -L "$BIN"
            exit 1
          fi
          cp "$LIBUSB_SRC" "$FRAMEWORKS/libusb-1.0.0.dylib"
          chmod 644 "$FRAMEWORKS/libusb-1.0.0.dylib"

          install_name_tool -change "$LIBUSB_SRC" \
            "@executable_path/../Frameworks/libusb-1.0.0.dylib" "$BIN"

          echo "--- otool after bundle ---"
          otool -L "$BIN"
          # Fail the build loudly if a Homebrew path is still referenced.
          if otool -L "$BIN" | grep -qE '(/opt/homebrew|/usr/local/)'; then
            echo "binary still references a Homebrew path; bundling failed"
            exit 1
          fi

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build/bin
          zip -r "../../Baudrun-macOS-${{ matrix.arch }}-${VERSION}.zip" Baudrun.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-package
          path: Baudrun-macOS-*.zip

  build-windows:
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: amd64
          - runner: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Patch productVersion from tag
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $json = Get-Content wails.json -Raw | ConvertFrom-Json
          $json.info.productVersion = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content wails.json
          Write-Host "Using version: $version"

      # Reuse the dist that ci.yml's frontend job already built; -s tells
      # wails to skip the install+build phase and use what's on disk.
      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build
        run: wails build -s -platform windows/${{ matrix.arch }}

      - name: Package
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $arch = "${{ matrix.arch }}"
          Compress-Archive -Path build\bin\Baudrun.exe -DestinationPath "Baudrun-Windows-$arch-$version.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-package
          path: Baudrun-Windows-*.zip

  build-linux:
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            appimage_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            appimage_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      # Wails' Linux backend links against GTK3 + WebKit2GTK at cgo time.
      # libwebkit2gtk-4.1-dev is the right flavor on Ubuntu 24.04 (the
      # 4.0 series was deprecated upstream in 2024). file + fuse3 are
      # needed downstream by appimagetool. libarchive-tools provides
      # bsdtar, which fpm's pacman target shells out to when building
      # .pkg.tar.zst — Ubuntu's default tar isn't bsdtar.
      # libusb-1.0-0-dev is pulled in for usbserial-go's gousb cgo link.
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config \
            libusb-1.0-0-dev \
            ruby-dev build-essential file libfuse2t64 rpm libarchive-tools

      - name: Install fpm (drives both .deb and .rpm packaging)
        run: sudo gem install --no-document fpm

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Patch productVersion from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.json.tmp
          mv wails.json.tmp wails.json
          echo "Using version: $VERSION"

      # Reuse the dist that ci.yml's frontend job already built; -s tells
      # wails to skip the install+build phase and use what's on disk.
      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      # webkit2_41 flips Wails' pkg-config to webkit2gtk-4.1 (Ubuntu
      # 24.04 default) instead of the long-deprecated 4.0.
      - name: Build
        run: wails build -s -platform linux/${{ matrix.arch }} -tags webkit2_41

      # Construct a FHS-style staging tree that both packagers consume.
      # The binary lives at /usr/bin/baudrun (lowercase — debian
      # convention); the .desktop + icon go to their standard
      # freedesktop locations so the installed app shows up in
      # application launchers and gets a proper icon.
      #
      # The udev rule installed under /usr/lib/udev/rules.d/ grants
      # the currently-logged-in console user ACL-based access to
      # USB-serial adapters via systemd-logind's uaccess tag — so
      # Baudrun can open /dev/ttyUSB* without sudo and without the
      # user having to join `dialout` first. See
      # packaging/linux/60-baudrun-serial.rules for the full rule
      # and packaging/linux/baudrun-postinstall.sh for the
      # reload-udev hook fpm runs after install.
      - name: Stage install tree
        run: |
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
          mkdir -p pkg/usr/lib/udev/rules.d
          install -m 755 build/bin/Baudrun pkg/usr/bin/baudrun
          install -m 644 packaging/linux/baudrun.desktop pkg/usr/share/applications/baudrun.desktop
          install -m 644 build/appicon.png pkg/usr/share/icons/hicolor/256x256/apps/baudrun.png
          install -m 644 packaging/linux/60-baudrun-serial.rules pkg/usr/lib/udev/rules.d/60-baudrun-serial.rules

      # SemVer goes straight into fpm's --version. --iteration stays at 1
      # unless the same SemVer needs to ship again with packaging-only
      # changes, which would be a manual bump.
      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fpm -s dir -t deb \
            --name baudrun \
            --version "${VERSION}" \
            --iteration "1" \
            --architecture "${{ matrix.arch }}" \
            --depends "libgtk-3-0 | libgtk-3-0t64" \
            --depends "libwebkit2gtk-4.1-0" \
            --depends "libusb-1.0-0" \
            --description "A serial terminal for network devices" \
            --url "https://github.com/packetThrower/Baudrun" \
            --maintainer "Will Lehnertz <lehnertz85@gmail.com>" \
            --license "GPL-3.0-or-later" \
            --deb-no-default-config-files \
            --after-install packaging/linux/baudrun-postinstall.sh \
            --after-upgrade packaging/linux/baudrun-postinstall.sh \
            -C pkg \
            --package "baudrun_${VERSION}-1_${{ matrix.arch }}.deb" \
            .

      # Fedora 40+ package names for GTK/WebKit differ from Debian's.
      - name: Build .rpm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fpm -s dir -t rpm \
            --name baudrun \
            --version "${VERSION}" \
            --iteration "1" \
            --architecture "${{ matrix.appimage_arch }}" \
            --depends "gtk3" \
            --depends "webkit2gtk4.1" \
            --depends "libusbx" \
            --description "A serial terminal for network devices" \
            --url "https://github.com/packetThrower/Baudrun" \
            --maintainer "Will Lehnertz <lehnertz85@gmail.com>" \
            --license "GPL-3.0-or-later" \
            --after-install packaging/linux/baudrun-postinstall.sh \
            --after-upgrade packaging/linux/baudrun-postinstall.sh \
            -C pkg \
            --package "baudrun-${VERSION}-1.${{ matrix.appimage_arch }}.rpm" \
            .

      # Arch Linux package. fpm's pacman target builds the archive
      # directly without needing makepkg or a native Arch runner. Arch
      # package names for the GTK/WebKit deps match Fedora's here.
      - name: Build .pkg.tar.zst
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fpm -s dir -t pacman \
            --name baudrun \
            --version "${VERSION}" \
            --iteration "1" \
            --architecture "${{ matrix.appimage_arch }}" \
            --depends "gtk3" \
            --depends "webkit2gtk-4.1" \
            --depends "libusb" \
            --description "A serial terminal for network devices" \
            --url "https://github.com/packetThrower/Baudrun" \
            --maintainer "Will Lehnertz <lehnertz85@gmail.com>" \
            --license "GPL-3.0-or-later" \
            --after-install packaging/linux/baudrun-postinstall.sh \
            --after-upgrade packaging/linux/baudrun-postinstall.sh \
            -C pkg \
            --package "baudrun-${VERSION}-1-${{ matrix.appimage_arch }}.pkg.tar.zst" \
            .

      # AppImage is a self-contained bundle; reuses the same staging
      # tree under AppDir/. AppRun is the entrypoint the runtime
      # invokes; the top-level .desktop + .DirIcon are required by
      # appimagetool's validator.
      #
      # libusb-1.0.so.0 is bundled under AppDir/usr/lib so the
      # AppImage doesn't assume the target system has a runtime
      # libusb installed. AppRun prepends that dir to
      # LD_LIBRARY_PATH so the dynamic linker finds it before
      # falling through to system paths. Glob by arch triplet
      # rather than hardcoding /usr/lib/x86_64-linux-gnu to keep
      # this step arm64-clean (aarch64-linux-gnu on the ARM
      # runner).
      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p AppDir/usr/lib
          cp -r pkg/usr/bin AppDir/usr/
          cp -r pkg/usr/share AppDir/usr/
          cp /usr/lib/*/libusb-1.0.so.0* AppDir/usr/lib/ 2>/dev/null || {
            echo "libusb-1.0.so.0 not found in /usr/lib/*/"
            ls -la /usr/lib/
            exit 1
          }
          cp packaging/linux/baudrun.desktop AppDir/baudrun.desktop
          cp build/appicon.png AppDir/baudrun.png
          ln -sf baudrun.png AppDir/.DirIcon
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          exec "${HERE}/usr/bin/baudrun" "$@"
          EOF
          chmod +x AppDir/AppRun
          wget -q -O appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage"
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run AppDir \
            "Baudrun-${VERSION}-${{ matrix.appimage_arch }}.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-package
          path: |
            baudrun_*.deb
            baudrun-*.rpm
            baudrun-*.pkg.tar.zst
            Baudrun-*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      # Full history + tags so the release-notes step below can
      # resolve the previous tag and list commits between it and
      # the current tag.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Filter by *-package so we don't pull down ci.yml's frontend-dist,
      # which isn't a user-facing release asset.
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "*-package"

      # Each subdir already holds only the packaged files; hash them with
      # bare basenames (not their subdir paths) so the SHA256SUMS lines
      # match the filenames users see on the release page.
      - name: Generate SHA256SUMS
        run: |
          for dir in artifacts/*/; do
            (cd "$dir" && sha256sum *)
          done | sort > SHA256SUMS
          cat SHA256SUMS

      # Build a "What's Changed" body from the commit log between the
      # previous tag and this one. GitHub's built-in
      # generate_release_notes only lists PR-merged commits, and
      # direct-to-main commits (our default workflow) would be
      # invisible there — hence the custom body. Falls back to the
      # full commit log if this is the very first tag.
      - name: Build release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          CURRENT_TAG="${GITHUB_REF_NAME}"

          {
            echo "## What's Changed"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log --no-merges --format='* %s (%h)' "${PREV_TAG}..${CURRENT_TAG}"
              echo
              echo "**Full Changelog**: ${REPO_URL}/compare/${PREV_TAG}...${CURRENT_TAG}"
            else
              git log --no-merges --format='* %s (%h)' "${CURRENT_TAG}"
              echo
              echo "**Full Changelog**: ${REPO_URL}/commits/${CURRENT_TAG}"
            fi
          } > release-notes.md

          echo "--- Generated release notes ---"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/macos-arm64-package/*
            artifacts/macos-amd64-package/*
            artifacts/windows-amd64-package/*
            artifacts/windows-arm64-package/*
            artifacts/linux-amd64-package/*
            artifacts/linux-arm64-package/*
            SHA256SUMS
          body_path: release-notes.md
          draft: false
          prerelease: false
