name: Release

on:
  push:
    tags:
      # Stable SemVer: v0.4.0, v1.2.3.
      - "v[0-9]+.[0-9]+.[0-9]+"
      # Pre-release SemVer: v0.8.0-beta.1, v1.0.0-rc.2, etc. The
      # release job inspects the tag and flips prerelease=true on
      # the GitHub Release when a hyphen is present, so these show
      # up with the "Pre-release" label and don't displace the
      # "Latest release" pointer.
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# No workflow-level `permissions:` — each job declares its own so
# the `contents: write` needed to publish the release is scoped to
# the one job that actually creates it. The build jobs and the
# `ci` call only read the repo.

# Queue, don't cancel: a mid-flight release shouldn't be interrupted
# by a retag of the same version — risk of half-uploaded artifacts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    # Reusable workflow; ci.yml declares its own `contents: read`.
    uses: ./.github/workflows/ci.yml

  build-macos:
    needs: [ci]
    # Builds + uploads an artifact — reads the repo only. The
    # release-publishing `contents: write` lives on the `release`
    # job alone.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26 is Apple Silicon only (Tahoe SDK). macos-15-intel
          # is GitHub's replacement for the retired macos-13 image —
          # x86_64 hardware running Sequoia, supported through 2027
          # while Apple's Intel transition wraps up.
          - runner: macos-26
            arch: arm64
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            arch: amd64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      # `persist-credentials: false` — build jobs never push.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust (stable)
        # SHA-pinned: the `@stable` branch ref no longer carries the
        # channel, so `toolchain:` states it explicitly.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # `shared-key: release` makes successive release-tag runs
      # share the release-mode `target/` cache across tags — `v0.0.2`
      # inherits `v0.0.1`'s compiled object files for the same
      # Cargo.lock hash, dropping the 10+ min cold compile to
      # ~minutes. CI uses the default (no shared-key) so its
      # debug-mode cache stays separate from these release-mode
      # artifacts.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release

      # pkg-config is needed by serialport's IOKit lookups. libusb
      # itself is vendored via `rusb` ([dependencies] in Cargo.toml),
      # so no Homebrew libusb install needed at build time and no
      # install_name_tool dance after bundling.
      - name: Install macOS build deps
        run: brew install pkg-config

      - name: Install cargo-packager
        uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: cargo-packager

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Awk over sed: BSD sed's `1,/.../{s/.../}` block syntax
          # bombs on macOS, while GNU sed accepts it. Awk handles
          # the in-[package]-section scoping portably, so the same
          # one-liner ports across BSD/macOS and GNU/Linux without
          # platform-specific branches.
          awk -v v="$VERSION" '
            /^\[/ { in_pkg = ($0 == "[package]") }
            in_pkg && /^version = / && !done { print "version = \"" v "\""; done=1; next }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          # Mirror to the Info.plist so the bundle's
          # CFBundleShortVersionString + CFBundleVersion match the
          # tag rather than the static "0.0.1" sitting in the
          # file. cargo-packager itself reads these from the plist
          # we hand it via `info-plist-path`.
          plutil -replace CFBundleShortVersionString -string "$VERSION" resources/Info.plist
          plutil -replace CFBundleVersion -string "$VERSION" resources/Info.plist
          echo "Building version: $VERSION"

      # `-f app -f dmg` produces both bundle types in one cargo-
      # packager invocation. `before-packaging-command` in
      # Cargo.toml runs `cargo build --release` once and both
      # formats reuse the resulting binary.
      #
      # No `--target ${{ matrix.target }}` flag: each runner is
      # already native for its arch (macos-26 = aarch64-apple-darwin,
      # macos-15-intel = x86_64-apple-darwin, etc.), so the default
      # host target matches what we want. Passing --target would
      # make cargo-packager look under `target/<triple>/release/`
      # while the inner `cargo build --release` (no --target) puts
      # the binary at `target/release/` — file-not-found from a
      # disagreement between bundler and inner build.
      - name: Build .app + .dmg
        run: cargo packager --release -f app -f dmg

      - name: Stage artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-artifacts
          BUNDLE="target/release"

          # cargo-packager's .dmg naming uses its own arch labels
          # (`aarch64` for arm64, `x64` for amd64) — inconsistent
          # between platforms, and out of step with the
          # `arm64`/`amd64` matrix labels we expose in the user-
          # facing filenames. Glob whatever cargo-packager
          # produced and rename to our convention. There's only
          # one .dmg per build so the glob is unambiguous.
          DMG=$(find "${BUNDLE}" -maxdepth 1 -name 'Baudrun_*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "no .dmg produced by cargo-packager"
            ls -la "$BUNDLE"
            exit 1
          fi
          mv "$DMG" "release-artifacts/Baudrun_${VERSION}_${{ matrix.arch }}.dmg"

          # Drag-droppable .app zip for users who prefer to skip
          # the .dmg mount-and-drag dance. `ditto -c -k --keepParent`
          # preserves resource forks and extended attributes —
          # matters once Phase 9 #3 (signing) lands; the .app's
          # code-signing xattrs need to round-trip through the
          # archive unchanged.
          ditto -c -k --keepParent \
            "${BUNDLE}/Baudrun.app" \
            "release-artifacts/Baudrun-macOS-${{ matrix.arch }}-${VERSION}.zip"

          echo "--- staged ---"
          ls -la release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-${{ matrix.arch }}-package
          path: release-artifacts/*

  build-windows:
    needs: [ci]
    # Build + upload only — see build-macos.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: amd64
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            arch: arm64
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      # `persist-credentials: false` — build jobs never push.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust (stable)
        # SHA-pinned: the `@stable` branch ref no longer carries the
        # channel, so `toolchain:` states it explicitly.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # See the macOS job's note on `shared-key: release`.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release

      - name: Install cargo-packager
        uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: cargo-packager

      - name: Patch version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content Cargo.toml -Raw) -replace '(?m)^version = .*', "version = `"$version`"" |
            Set-Content -NoNewline Cargo.toml
          Write-Host "Building version: $version"

      # NSIS ships on every Windows build. The MSI (WiX) path is
      # narrower — gated on two independent conditions:
      #
      #   (a) Stable tag only. WiX requires a numeric-only pre-
      #       release identifier and rejects alphanumeric ones
      #       like 0.9.0-alpha.3. NSIS has no such restriction.
      #
      #   (b) amd64 only. cargo-packager 0.11.8 hardcodes a
      #       download of WiX 3.11 (2017), whose `candle.exe`
      #       predates `-arch arm64` — that was added in WiX
      #       3.14. So `candle.exe -arch arm64` exits non-zero
      #       and the build dies; cargo-packager's error Display
      #       (`"Error running {0}: {0}"`) throws the real
      #       message away, leaving the unhelpful
      #       `ERROR Error running candle.exe: candle.exe` seen
      #       on v0.9.7's first stable build. It is NOT a runner
      #       or x86-emulation problem — candle.exe runs fine
      #       under emulation; the bundled WiX is just too old.
      #       cargo-packager has no WiX-version override, so the
      #       real fix is moving MSI generation to cargo-wix
      #       (modern WiX, native arm64) — tracked in TODO.md.
      #       Until then arm64 users get the NSIS installer or
      #       the portable `.zip`; corporate-deploy workflows
      #       that need MSI are overwhelmingly x64 anyway.
      #
      # The GH Actions ternary `cond && X || Y` returns Y when X
      # is falsy — and the empty string is falsy. So we compose
      # both gates with `&&` first, then fall back to the empty
      # string on either negative branch.
      #
      # Same `--target` omission as macOS: runner is native, so
      # the default host target matches; passing --target would
      # split paths between `target/<triple>/release/` (what
      # cargo-packager expects) and `target/release/` (what
      # `cargo build --release` produces without --target).
      - name: Build .exe (NSIS) + .msi (stable amd64 only)
        shell: cmd
        run: cargo packager --release -f nsis ${{ (!contains(github.ref_name, '-') && matrix.arch == 'amd64') && '-f wix' || '' }}

      - name: Stage artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $arch = "${{ matrix.arch }}"
          $bundle = "target/release"
          New-Item -ItemType Directory -Force release-artifacts | Out-Null

          Write-Host "--- contents of $bundle ---"
          Get-ChildItem -Path $bundle -File -Recurse | ForEach-Object { $_.FullName }

          # NSIS .exe and (stable-only) WiX .msi pick up directly
          # from cargo-packager's output dir. cargo-packager names
          # them `Baudrun_<version>_<arch>-setup.exe` and
          # `Baudrun_<version>_<arch>.msi`.
          Get-ChildItem "$bundle/*-setup.exe" -ErrorAction SilentlyContinue |
            Copy-Item -Destination release-artifacts/
          Get-ChildItem "$bundle/*.msi" -ErrorAction SilentlyContinue |
            Copy-Item -Destination release-artifacts/

          # Portable .zip of the bare Baudrun.exe for users who'd
          # rather not run an installer.
          Compress-Archive `
            -Path "$bundle/Baudrun.exe" `
            -DestinationPath "release-artifacts/Baudrun-Windows-$arch-$version.zip"

          Write-Host "--- staged ---"
          Get-ChildItem release-artifacts | ForEach-Object { $_.Name }

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-${{ matrix.arch }}-package
          path: release-artifacts/*

  build-linux:
    needs: [ci]
    # Build + upload only — see build-macos.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            target: x86_64-unknown-linux-gnu
            rpm_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
            rpm_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      # `persist-credentials: false` — build jobs never push.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust (stable)
        # SHA-pinned: the `@stable` branch ref no longer carries the
        # channel, so `toolchain:` states it explicitly.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # See the macOS job's note on `shared-key: release`.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release

      # libudev is needed at link time by the serialport crate
      # (tty/serial enumeration via libudev-sys). libusb is
      # vendored via rusb so no libusb-1.0-0-dev. gpui_linux's
      # pkg-config probes need xkbcommon / wayland / x11 / xcb
      # headers — same set as CI. AppImage tooling needs file +
      # fuse3 + libfuse2 (AppImage runtime check on AppImageTool
      # invocation). libarchive-tools brings in `bsdtar`, which
      # `fpm -t pacman` shells out to for the .pkg.tar.zst
      # mtree pass.
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev libxcb1-dev libxcb-randr0-dev \
            libxcb-xkb-dev libxcb-cursor-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-render0-dev \
            libfontconfig1-dev libfreetype-dev \
            pkg-config \
            file fuse3 libfuse2 ruby-dev \
            libarchive-tools

      - name: Install cargo-packager
        uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: cargo-packager

      - name: Install fpm (for .rpm + .pkg.tar.zst)
        run: sudo gem install --no-document fpm

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Awk (over sed) for portability with the macOS job —
          # see the macOS step's note. On Linux GNU sed would also
          # work but using the same tool everywhere keeps the
          # workflow auditable.
          awk -v v="$VERSION" '
            /^\[/ { in_pkg = ($0 == "[package]") }
            in_pkg && /^version = / && !done { print "version = \"" v "\""; done=1; next }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          echo "Building version: $VERSION"

      # cargo-packager covers .deb and .AppImage natively. Its
      # `pacman` format writes a `.tar.gz` + PKGBUILD intended for
      # AUR submission, not the directly-installable `.pkg.tar.zst`
      # users expect from `pacman -U`, so we skip cargo-packager's
      # pacman target and use fpm for both .rpm and .pkg.tar.zst.
      # Same `fpm -s dir -t pacman` pattern the old Tauri release.yml
      # used (Tauri's bundler didn't target pacman either).
      #
      # Same `--target` omission as the macOS / Windows jobs: the
      # runner is native, so the default host target matches and
      # cargo-packager finds the binary at `target/release/`
      # alongside the cargo build it invoked.
      - name: Build .deb + .AppImage
        run: cargo packager --release -f deb -f appimage

      # cargo-packager 0.11 doesn't expose .deb postinst hooks, so
      # we patch the freshly-built .deb to inject one that reloads
      # udev rules + retriggers attached tty/usb devices. Matches
      # what the old Tauri release.yml shipped via
      # `tauri.conf.json`'s `postInstallScript`. Without this,
      # users install the .deb, get `/dev/ttyUSB0: Permission
      # denied`, and have to manually unplug-replug or shell
      # `udevadm control --reload` themselves before the udev
      # rule we ship at /usr/lib/udev/rules.d/60-baudrun-serial.rules
      # takes effect.
      - name: Inject .deb postinst (udev reload)
        run: |
          set -e
          DEB=$(find target/release -maxdepth 1 -name '*.deb' | head -1)
          if [ -z "$DEB" ]; then
            echo "no .deb produced by cargo-packager — nothing to patch"
            exit 0
          fi
          echo "Patching $DEB with postinst hook"

          WORK=$(mktemp -d)
          dpkg-deb -R "$DEB" "$WORK"
          mkdir -p "$WORK/DEBIAN"

          # Copy the same script the .rpm + .pacman builds use via
          # fpm's --after-install, so all three formats activate
          # the udev rule the same way. `-x` lets dpkg recognise
          # the maintainer script.
          cp packaging/linux/baudrun-postinstall.sh "$WORK/DEBIAN/postinst"
          chmod 0755 "$WORK/DEBIAN/postinst"

          # postrm fires the same reload on uninstall so the rule
          # going away (or being replaced on upgrade) re-triggers
          # tty/usb permission resolution. Same script handles
          # both — its check for /run/udev no-ops in chroots.
          cp packaging/linux/baudrun-postinstall.sh "$WORK/DEBIAN/postrm"
          chmod 0755 "$WORK/DEBIAN/postrm"

          # Rebuild in place. xz is what cargo-packager itself uses;
          # specifying it explicitly avoids dpkg-deb's default
          # which may differ between Ubuntu releases.
          dpkg-deb -Z xz -b "$WORK" "$DEB"
          rm -rf "$WORK"

      - name: Build .rpm via fpm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${{ matrix.rpm_arch }}"
          BIN="target/release/Baudrun"

          mkdir -p pkg/usr/bin
          cp "$BIN" pkg/usr/bin/baudrun
          chmod +x pkg/usr/bin/baudrun

          mkdir -p pkg/usr/share/applications
          cp packaging/linux/baudrun.desktop pkg/usr/share/applications/

          mkdir -p pkg/usr/lib/udev/rules.d
          cp packaging/linux/60-baudrun-serial.rules pkg/usr/lib/udev/rules.d/

          mkdir -p pkg/usr/share/icons/hicolor/512x512/apps
          cp resources/icons/icon.png pkg/usr/share/icons/hicolor/512x512/apps/baudrun.png

          mkdir -p release-artifacts
          # Runtime libs matching the wayland+x11+font-kit surface
          # gpui_linux pulls in. The Cargo.toml deb metadata
          # carries the equivalent list for apt — keep these two
          # lists in lockstep when bumping.
          #
          # `()(64bit)` arch qualifier on every SONAME: RPM-based
          # distros (Fedora / openSUSE / RHEL / Mageia / …)
          # auto-generate library `Provides:` entries as
          # `libfoo.so.N()(64bit)` on 64-bit arches — both
          # aarch64 and x86_64 use the same 64bit token. Without
          # the suffix, dnf / zypper see our bare `libfoo.so.N`
          # Requires and refuse to match against
          # `libfoo.so.N()(64bit)` Provides, surfacing as
          # "nothing provides libX11.so.6" at install time. If
          # we ever add an i686 arch the suffix becomes
          # `()(32bit)` — gate per-ARCH then. Until then, both
          # the architectures we ship are 64-bit.
          fpm -s dir -t rpm -C pkg \
            --name baudrun --version "$VERSION" --architecture "$ARCH" \
            --license GPL-3.0-or-later \
            --description "Serial terminal for network engineers." \
            --url "https://packetthrower.github.io/Baudrun/" \
            --vendor "packetThrower" --maintainer "packetThrower" \
            --depends 'libxkbcommon.so.0()(64bit)' \
            --depends 'libxkbcommon-x11.so.0()(64bit)' \
            --depends 'libwayland-client.so.0()(64bit)' \
            --depends 'libwayland-cursor.so.0()(64bit)' \
            --depends 'libX11.so.6()(64bit)' \
            --depends 'libxcb.so.1()(64bit)' \
            --depends 'libxcb-cursor.so.0()(64bit)' \
            --depends 'libxcb-randr.so.0()(64bit)' \
            --depends 'libxcb-render.so.0()(64bit)' \
            --depends 'libxcb-shape.so.0()(64bit)' \
            --depends 'libxcb-xfixes.so.0()(64bit)' \
            --depends 'libxcb-xkb.so.1()(64bit)' \
            --depends 'libfontconfig.so.1()(64bit)' \
            --depends 'libfreetype.so.6()(64bit)' \
            --depends 'libudev.so.1()(64bit)' \
            --after-install packaging/linux/baudrun-postinstall.sh \
            --package "release-artifacts/Baudrun-${VERSION}-1.${ARCH}.rpm"

      # Pacman / Arch builds — uses the same staging directory `pkg`
      # the .rpm step already populated. fpm's pacman target
      # accepts the same layout and emits a `.pkg.tar.zst` ready
      # for `pacman -U`. No-deps `--depends` would be cleaner but
      # libudev's exact pacman package name varies; leaving deps
      # empty here matches what the old Tauri release.yml shipped.
      - name: Build .pkg.tar.zst via fpm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${{ matrix.rpm_arch }}"
          fpm -s dir -t pacman -C pkg \
            --name baudrun --version "$VERSION" --architecture "$ARCH" \
            --license GPL-3.0-or-later \
            --description "Serial terminal for network engineers." \
            --url "https://packetthrower.github.io/Baudrun/" \
            --vendor "packetThrower" --maintainer "packetThrower" \
            --after-install packaging/linux/baudrun-postinstall.sh \
            --package "release-artifacts/baudrun-${VERSION}-1-${ARCH}.pkg.tar.zst"

      - name: Stage artifacts
        run: |
          mkdir -p release-artifacts
          BUNDLE="target/release"

          echo "--- cargo-packager outputs ---"
          ls -la "$BUNDLE" 2>/dev/null || true

          # cargo-packager places its outputs at the same level as
          # the binary. Filenames are
          # Baudrun_<version>_<arch>.<format>.
          cp "$BUNDLE"/*.deb release-artifacts/ 2>/dev/null || true
          cp "$BUNDLE"/*.AppImage release-artifacts/ 2>/dev/null || true

          echo "--- staged ---"
          ls -la release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-${{ matrix.arch }}-package
          path: release-artifacts/*

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    # The one job that needs write: it creates the GitHub Release and
    # uploads the artifacts. Everything upstream is read-only.
    permissions:
      contents: write
    steps:
      # Full history + tags so the release-notes step below can
      # resolve the previous tag and list commits between it and
      # the current tag.
      # `persist-credentials: false` — the release job only reads
      # git locally (`git log` / `git describe`); the GitHub Release
      # is created through the API token, not `git push`.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "*-package"

      # Hash with bare basenames (not their subdir paths) so SHA256SUMS
      # lines match the filenames users see on the release page.
      - name: Generate SHA256SUMS
        run: |
          for dir in artifacts/*/; do
            (cd "$dir" && sha256sum ./*)
          done | sort > SHA256SUMS
          cat SHA256SUMS

      # Build a "What's Changed" body from the commit log between the
      # previous tag and this one. GitHub's generate_release_notes
      # only lists PR-merged commits, which misses direct-to-main
      # commits. Previous-tag logic branches on release type:
      #   - Pre-release (v*.*.*-*): walk to the most recent tag of
      #     any kind. Beta-to-beta deltas are easy to read.
      #   - Stable (v*.*.*): --exclude='*-*' skips pre-release tags
      #     so the final release's log spans the whole stable-to-
      #     stable window, not just the delta since the last beta.
      - name: Build release notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if [[ "${CURRENT_TAG}" == *-* ]]; then
            IS_PRERELEASE=1
            PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
          else
            IS_PRERELEASE=0
            PREV_TAG=$(git describe --tags --abbrev=0 --exclude='*-*' "${CURRENT_TAG}^" 2>/dev/null || true)
          fi

          {
            if [ "$IS_PRERELEASE" = "1" ]; then
              echo "> ⚠️ **Pre-release.** Published for testing. Behaviour and artifacts are not final."
              echo
            fi

            # Platform-test disclaimer. Honest framing while Windows /
            # Linux builds catch up — keep this banner until those
            # platforms are routinely exercised against real hardware,
            # then drop the block.
            echo "> ℹ️ **Platform support — early days.**"
            echo ">"
            echo "> macOS builds (arm64 + amd64) are tested with a real serial connection."
            echo "> Windows and Linux builds are produced by CI but **not yet routinely tested against real hardware**."
            echo "> If you hit issues on those platforms, please file an issue at <https://github.com/packetThrower/Baudrun/issues>."
            echo
            echo "## What's Changed"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log --no-merges --format='* %s (%h)' "${PREV_TAG}..${CURRENT_TAG}"
              echo
              echo "**Full Changelog**: ${REPO_URL}/compare/${PREV_TAG}...${CURRENT_TAG}"
            else
              git log --no-merges --format='* %s (%h)' "${CURRENT_TAG}"
              echo
              echo "**Full Changelog**: ${REPO_URL}/commits/${CURRENT_TAG}"
            fi
          } > release-notes.md

          echo "--- Generated release notes ---"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/macos-arm64-package/*
            artifacts/macos-amd64-package/*
            artifacts/windows-amd64-package/*
            artifacts/windows-arm64-package/*
            artifacts/linux-amd64-package/*
            artifacts/linux-arm64-package/*
            SHA256SUMS
          body_path: release-notes.md
          draft: false
          # Tags with a hyphen in the SemVer pre-release slot flag
          # as pre-release so GitHub shows the "Pre-release" badge
          # and leaves "Latest release" on the most recent stable.
          prerelease: ${{ contains(github.ref_name, '-') }}
