version: 2

# Dependency-update schedule for the three ecosystems Baudrun
# uses today: the single Rust crate at the repo root, the Astro
# docs site under docs-next/, and the GitHub Actions in the
# workflows. Paths are explicit so renaming a directory surfaces
# as a Dependabot error instead of silently dropping coverage.

updates:
  # The app itself — one Rust crate at the repo root. Cargo.toml +
  # Cargo.lock are the source of truth for every native dep (gpui,
  # gpui-component, alacritty_terminal, serialport, rusb, ureq, …).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # One PR for the routine patch/minor sweep instead of a
      # dozen; majors still come through individually so they get
      # a proper look.
      cargo-minor:
        update-types: ["minor", "patch"]

  # Docs site — Astro + Starlight, a self-contained pnpm project
  # under docs-next/. Dependabot's `npm` ecosystem reads
  # pnpm-lock.yaml the same way it reads package-lock.json.
  - package-ecosystem: "npm"
    directory: "/docs-next"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      docs-minor:
        update-types: ["minor", "patch"]
    ignore:
      # Starlight 0.41+ peer-requires astro 7 (`"astro": "^7.0.2"`),
      # a new MAJOR — but 0.40 -> 0.41 looks like a minor, so the
      # docs-minor group kept proposing it and the build kept failing
      # (`import { AstroError } from "astro/errors"` doesn't resolve
      # against astro 6). PRs #64 and #75 were both this. Ignore it
      # until the astro-7 migration is done deliberately (astro +
      # starlight bumped together, custom component overrides — Hero,
      # SocialIcons — re-verified). Remove both entries when that
      # lands. Astro majors were already individually-reviewed; the
      # explicit ignore just keeps the pair in lockstep.
      - dependency-name: "@astrojs/starlight"
        versions: [">=0.41.0"]
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]

  # GitHub Actions in .github/workflows/. The workflows pin every
  # action to a full commit SHA; Dependabot understands SHA pins
  # (it bumps the SHA and the trailing `# vX.Y.Z` comment
  # together), so this is what keeps the pins from going stale.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-all:
        patterns: ["*"]
